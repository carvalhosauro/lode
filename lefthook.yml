# Git hooks (run via `lefthook install`). Fast, language-agnostic.
pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --check
    clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      stage_fixed: false

commit-msg:
  commands:
    conventional:
      # Self-contained Conventional Commits check (no external tool needed).
      run: |
        head -1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+' \
          || { echo "✗ Commit message must follow Conventional Commits (e.g. 'feat(core): add parse tree')."; exit 1; }

pre-push:
  commands:
    test:
      run: cargo nextest run --workspace 2>/dev/null || cargo test --workspace
