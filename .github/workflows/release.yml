name: Release

# On a version tag (pushed by the release-plz PR merge, or by hand), build the static
# single binary for each target and attach it (with checksums) to the GitHub Release.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build and upload `lode`
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lode
          target: ${{ matrix.target }}
          archive: lode-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
