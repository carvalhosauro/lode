name: Bug report
description: Something in Lode behaves incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you observe vs. expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Command, input log shape, and what you saw.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lode version (`lode --version`) and OS
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: text
